services:
  postgres:
    image: postgres:15-alpine
    container_name: zxc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zxc-network

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: migrator
    container_name: zxc-migrator
    volumes:
      - ./config.docker.toml:/app/config.toml
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zxc-network
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: server
    container_name: zxc-api
    volumes:
      - ./config.docker.toml:/app/config.toml
      - ./test/certs:/app/certs:ro
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - zxc-network
    restart: unless-stopped

  webhook:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: webhook
    container_name: zxc-webhook
    volumes:
      - ./config.docker.toml:/app/config.toml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - zxc-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: worker
    container_name: zxc-worker
    volumes:
      - ./config.worker-a.docker.toml:/app/config.toml
      - ./test/fixtures/id_ed25519:/app/deploy_key:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      storage:
        condition: service_healthy
      target:
        condition: service_started
    networks:
      - zxc-network
    restart: unless-stopped

  target:
    build:
      context: .
      dockerfile: test/Dockerfile.sshd
    container_name: zxc-target
    networks:
      - zxc-network

  storage:
    image: minio/minio:latest
    container_name: zxc-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - storage_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zxc-network

  storage-init:
    image: minio/mc:latest
    container_name: zxc-storage-init
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://storage:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/tenants &&
      mc anonymous set public local/tenants
      "
    depends_on:
      storage:
        condition: service_healthy
    networks:
      - zxc-network
    restart: "no"

volumes:
  postgres_data:
  storage_data:

networks:
  zxc-network:
    driver: bridge
