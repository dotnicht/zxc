syntax = "proto3";

package target;

option go_package = "zxc/api/target;target";

service TargetService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message Target {
  bytes id = 1;
  string address = 2;
  bytes owner_id = 3;
  string created_at = 4;
  string updated_at = 5;
  string user = 6;
  string key = 7;
  string status = 8;
}

message CreateRequest {
  bytes owner_id = 1;
  string address = 2;
  string user = 3;
  string key = 4;
}

message CreateResponse {
  Target target = 1;
}

message GetRequest {
  bytes id = 1;
}

message GetResponse {
  Target target = 1;
}

message UpdateRequest {
  bytes id = 1;
  string address = 2;
  string user = 3;
  string key = 4;
}

message UpdateResponse {
  Target target = 1;
}

message DeleteRequest {
  bytes id = 1;
}

message DeleteResponse {
  bool success = 1;
}

message ListRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListResponse {
  repeated Target targets = 1;
  int32 total = 2;
}
