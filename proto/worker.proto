syntax = "proto3";

package worker;

option go_package = "zxc/api/worker;worker";

import "proto/tenant.proto";

service WorkerService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc AssignTenant(AssignTenantRequest) returns (AssignTenantResponse);
  rpc UnassignTenant(UnassignTenantRequest) returns (UnassignTenantResponse);
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  rpc ListWorkersForTenant(ListWorkersForTenantRequest) returns (ListWorkersForTenantResponse);
}

message Worker {
  string id = 1;
  string name = 2;
  string created_at = 3;
  string updated_at = 4;
}

message CreateRequest {
  string id = 1;
  string name = 2;
}

message CreateResponse {
  Worker worker = 1;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Worker worker = 1;
}

message UpdateRequest {
  string id = 1;
  string name = 2;
}

message UpdateResponse {
  Worker worker = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {
  bool success = 1;
}

message ListRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListResponse {
  repeated Worker workers = 1;
  int32 total = 2;
}

message SearchRequest {
  string query = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message SearchResponse {
  repeated Worker workers = 1;
  int32 total = 2;
}

message AssignTenantRequest {
  string worker_id = 1;
  string tenant_id = 2;
}

message AssignTenantResponse {
  bool success = 1;
}

message UnassignTenantRequest {
  string worker_id = 1;
  string tenant_id = 2;
}

message UnassignTenantResponse {
  bool success = 1;
}

message ListTenantsRequest {
  string worker_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListTenantsResponse {
  repeated tenant.Tenant tenants = 1;
  int32 total = 2;
}

message ListWorkersForTenantRequest {
  string tenant_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListWorkersForTenantResponse {
  repeated Worker workers = 1;
  int32 total = 2;
}
