syntax = "proto3";

package account;

option go_package = "zxc/api/account;account";

service AccountService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
}

message Account {
  string id = 1;
  string name = 2;
  string created_at = 3;
  string updated_at = 4;
}

message GetRequest {
  string tenant_id = 1;
  string id = 2;
}

message GetResponse {
  Account account = 1;
}

message ListRequest {
  string tenant_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListResponse {
  repeated Account accounts = 1;
  int32 total = 2;
}

message SearchRequest {
  string tenant_id = 1;
  string query = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message SearchResponse {
  repeated Account accounts = 1;
  int32 total = 2;
}
