syntax = "proto3";

package account;

option go_package = "zxc/api/account;account";

service AccountService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Disable(DisableRequest) returns (DisableResponse);
  rpc GetTalks(GetTalksRequest) returns (GetTalksResponse);
}

message Account {
  bytes id = 1;
  string name = 2;
  string status = 3;
  string created_at = 4;
  string updated_at = 5;
}

message GetRequest {
  bytes id = 1;
}

message GetResponse {
  Account account = 1;
}

message ListRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListResponse {
  repeated Account accounts = 1;
  int32 total = 2;
}

message DisableRequest {
  bytes id = 1;
}

message DisableResponse {
  Account account = 1;
}

message Post {
  bytes id = 1;
  bytes contact_id = 2;
  string text = 3;
  string created_at = 4;
}

message File {
  bytes id = 1;
  bytes contact_id = 2;
  string name = 3;
  string created_at = 4;
}

message TalkItem {
  string created_at = 1;
  oneof content {
    Post post = 2;
    File file = 3;
  }
}

message Talk {
  bytes id = 1;
  repeated TalkItem items = 2;
}

message GetTalksRequest {
  bytes profile_id = 1;
}

message GetTalksResponse {
  repeated Talk talks = 1;
}
