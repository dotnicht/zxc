syntax = "proto3";

package tenant;

option go_package = "zxc/api/tenant;tenant";

service TenantService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message Tenant {
  bytes id = 1;
  string name = 2;
  string database = 3;
  string storage = 4;
  string created_at = 5;
  string updated_at = 6;
  bytes owner_id = 7;
  string deploy = 8;
  string account = 9;
}

message CreateRequest {
  string name = 1;
  string database = 2;
  string storage = 3;
  string deploy = 4;
  string account = 5;
}

message CreateResponse {
  Tenant tenant = 1;
}

message GetRequest {
  bytes id = 1;
}

message GetResponse {
  Tenant tenant = 1;
}

message ListRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListResponse {
  repeated Tenant tenants = 1;
  int32 total = 2;
}
