syntax = "proto3";

package session;

option go_package = "zxc/api/session;session";

service SessionService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message Session {
  string id = 1;
  string account_id = 2;
  string status = 3;
  string created_at = 4;
  string updated_at = 5;
}

message CreateRequest {
  string tenant_id = 1;
  string account_id = 2;
  string status = 3;
}

message CreateResponse {
  Session session = 1;
}

message GetRequest {
  string tenant_id = 1;
  string id = 2;
}

message GetResponse {
  Session session = 1;
}

message UpdateRequest {
  string tenant_id = 1;
  string id = 2;
  string account_id = 3;
  string status = 4;
}

message UpdateResponse {
  Session session = 1;
}

message DeleteRequest {
  string tenant_id = 1;
  string id = 2;
}

message DeleteResponse {
  bool success = 1;
}

message ListRequest {
  string tenant_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListResponse {
  repeated Session sessions = 1;
  int32 total = 2;
}

