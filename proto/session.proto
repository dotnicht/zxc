syntax = "proto3";

package session;

option go_package = "zxc/api/session;session";

service SessionService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Start(StartRequest) returns (StartResponse);
  rpc Stop(StopRequest) returns (StopResponse);
}

message Session {
  bytes id = 1;
  bytes account_id = 2;
  string status = 3;
  string created_at = 4;
  string updated_at = 5;
}

message GetRequest {
  bytes id = 1;
}

message GetResponse {
  Session session = 1;
}

message StartRequest {
  bytes id = 1;
}

message StartResponse {
  Session session = 1;
}

message StopRequest {
  bytes id = 1;
}

message StopResponse {
  Session session = 1;
}

message ListRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListResponse {
  repeated Session sessions = 1;
  int32 total = 2;
}
