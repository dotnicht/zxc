syntax = "proto3";

package release;

import "buf/validate/validate.proto";

option go_package = "zxc/api/release;release";

service ReleaseService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Deploy(DeployRequest) returns (DeployResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message Release {
  string id = 1;
  string status = 2;
  string owner_id = 3;
  string created_at = 4;
  string updated_at = 5;
  string target_id = 6;
  string payload_id = 7;
  string changed_by_id = 8;
}

message GetRequest {
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  string id = 2 [(buf.validate.field).string.uuid = true];
}

message GetResponse {
  Release release = 1;
}

message CreateRequest {
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  string owner_id = 2 [(buf.validate.field).string.uuid = true, (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE];
  string target_id = 3 [(buf.validate.field).string.uuid = true];
  string payload_id = 4 [(buf.validate.field).string.uuid = true];
}

message CreateResponse {
  Release release = 1;
}

message DeployRequest {
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  string id = 2 [(buf.validate.field).string.uuid = true];
  string user_id = 3 [(buf.validate.field).string.uuid = true, (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE];
}

message DeployResponse {
  Release release = 1;
}

message ListRequest {
  string tenant_id = 1 [(buf.validate.field).string.uuid = true];
  int32 page = 2;
  int32 page_size = 3;
}

message ListResponse {
  repeated Release releases = 1;
  int32 total = 2;
}
