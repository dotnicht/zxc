syntax = "proto3";

package release;

option go_package = "zxc/api/release;release";

service ReleaseService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Deploy(DeployRequest) returns (DeployResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message Release {
  bytes id = 1;
  string status = 2;
  bytes owner_id = 3;
  string created_at = 4;
  string updated_at = 5;
  bytes target_id = 6;
  bytes payload_id = 7;
  bytes changed_by_id = 8;
}

message GetRequest {
  bytes id = 1;
}

message GetResponse {
  Release release = 1;
}

message CreateRequest {
  bytes owner_id = 1;
  bytes target_id = 2;
  bytes payload_id = 3;
}

message CreateResponse {
  Release release = 1;
}

message DeployRequest {
  bytes id = 1;
  bytes user_id = 2;
}

message DeployResponse {
  Release release = 1;
}

message ListRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListResponse {
  repeated Release releases = 1;
  int32 total = 2;
}
